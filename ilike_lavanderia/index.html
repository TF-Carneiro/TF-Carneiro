<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lavanderia - I Like</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="container">
    <h1>Lavanderia - I Like</h1>
    <form id="aptoForm">
      <!-- Campo para o nome -->
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="">

      <!-- Campo para o número do apartamento -->
      <label for="apto">Unidade:</label>
      <input type="text" id="apto" name="apto" placeholder="">

      <!-- Campo para a data do agendamento -->
      <label for="data">Agendamento:</label>
      <input type="date" id="data" name="data">

      <!-- Container para os campos de horário dispostos lado a lado -->
      <div class="time-container">
        <div class="time-field">
          <label for="horarioInicio">Início:</label>
          <select id="horarioInicio" name="horarioInicio"></select>
        </div>
        <div class="time-field">
          <label for="horarioFim">Fim:</label>
          <select id="horarioFim" name="horarioFim"></select>
        </div>
      </div>

      <button type="submit">Enviar</button>
    </form>
    <div id="message" class="message"></div>
  </div>
  <script src="./script/script.js"></script>
</body>

</html>
